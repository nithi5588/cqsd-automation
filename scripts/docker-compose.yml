name: cqsd

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cqsd
      POSTGRES_PASSWORD: cqsd
      POSTGRES_DB: cqsd
    ports:
      - "5433:5432"
    volumes:
      - cqsd_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cqsd"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - cqsd_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  cqsd_postgres_data:
    name: cqsd_postgres_data
  cqsd_redis_data:
    name: cqsd_redis_data
